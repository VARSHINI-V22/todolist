<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✓ todo list</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .todo-card {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2rem;
      box-shadow: 0 20px 40px -10px rgba(0, 30, 50, 0.3),
                  inset 0 1px 2px rgba(255,255,255,0.6);
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.5);
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0 0 0.25rem 0;
      color: #1a3b4e;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    h1 span {
      background: #2b5f7a;
      color: white;
      font-size: 1rem;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
    }
    .sub {
      color: #2f5270;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      border-left: 4px solid #5f9db2;
      padding-left: 0.8rem;
      background: rgba(95, 157, 178, 0.1);
      border-radius: 0 8px 8px 0;
    }
    .add-task {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 2.3rem;
      flex-wrap: wrap;
    }
    .add-task input {
      flex: 1 1 250px;
      padding: 0.9rem 1.2rem;
      border: none;
      border-radius: 50px;
      background: white;
      box-shadow: 0 8px 16px -8px rgba(0,40,60,0.2), inset 0 0 0 1px rgba(0,0,0,0.02);
      font-size: 1rem;
      transition: 0.2s;
    }
    .add-task input:focus {
      outline: none;
      box-shadow: 0 8px 16px -8px #1d5f7a, inset 0 0 0 2px #6ab0d6;
    }
    button {
      background: white;
      border: none;
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 50, 70, 0.1);
      transition: all 0.15s ease;
      border: 1px solid rgba(95, 157, 178, 0.3);
      color: #1f4b60;
    }
    button:hover {
      background: #e4f0f7;
      border-color: #6ab0d6;
      transform: scale(1.02);
      box-shadow: 0 10px 18px -8px #2b6c8a;
    }
    button.primary {
      background: #1f4b60;
      color: white;
      border: none;
      box-shadow: 0 10px 18px -10px #0b2a38;
    }
    button.primary:hover {
      background: #256b88;
    }
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .todo-item {
      background: white;
      border-radius: 60px;
      padding: 0.3rem 0.3rem 0.3rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 8px rgba(0, 30, 40, 0.08);
      border: 1px solid rgba(150, 190, 210, 0.3);
      transition: 0.1s;
    }
    .todo-item:hover {
      border-color: #9ac2d6;
      box-shadow: 0 8px 16px -12px #265f7a;
    }
    .todo-check {
      width: 1.5rem;
      height: 1.5rem;
      accent-color: #1f4b60;
      margin-left: 0.2rem;
      cursor: pointer;
    }
    .todo-text {
      flex: 1;
      font-size: 1.05rem;
      padding: 0.5rem 0.2rem;
      color: #1d3748;
      word-break: break-word;
      transition: 0.2s;
    }
    .completed .todo-text {
      text-decoration: line-through;
      color: #809eae;
    }
    .edit-mode .todo-text {
      display: none;
    }
    .edit-input {
      flex: 1;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      border: 2px solid #6ab0d6;
      font-size: 1rem;
      background: #f3faff;
      margin: 0 0.2rem;
      display: none;
    }
    .edit-mode .edit-input {
      display: block;
    }
    .item-actions {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .item-actions button {
      padding: 0.4rem 0.9rem;
      border-radius: 40px;
      font-size: 0.85rem;
      background: #f2f7fb;
      border: 1px solid #b3d4e5;
      color: #1b485e;
      box-shadow: none;
    }
    .item-actions button:hover {
      background: #daecf5;
    }
    .item-actions .delete-btn {
      color: #b13e3e;
      border-color: #e3b7b7;
    }
    .item-actions .delete-btn:hover {
      background: #ffe2e2;
      border-color: #d18c8c;
    }
    .edit-save-btn {
      background: #1f4b60 !important;
      color: white !important;
      border: none !important;
    }
    .edit-save-btn:hover {
      background: #1e5f7c !important;
    }
    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #627f92;
      text-align: center;
      border-top: 1px dashed #9fbacb;
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="todo-card">
    <h1>✔ todo list <span></span></h1>
    <div class="sub">THINGS TO DO </div>

   
    <div class="add-task">
      <input type="text" id="newTodoInput" placeholder="e.g., write documentation..." autofocus>
      <button class="primary" id="addTodoBtn"> Add</button>
    </div>

   
    <ul class="todo-list" id="todoListContainer"></ul>
    <div class="footer-note">TODO LIST </div>
  </div>

  <script>
    (function() {
      
      let todos = [
        
      ];

     
      const todoContainer = document.getElementById('todoListContainer');
      const newInput = document.getElementById('newTodoInput');
      const addBtn = document.getElementById('addTodoBtn');

      
      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
      }

      
      function renderTodos() {
        
        while (todoContainer.firstChild) {
          todoContainer.removeChild(todoContainer.firstChild);
        }

        todos.forEach(todo => {
          const li = document.createElement('li');
          li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
          li.dataset.id = todo.id;

          
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'todo-check';
          checkbox.checked = todo.completed;
          checkbox.setAttribute('aria-label', 'Toggle done');
          checkbox.addEventListener('change', (e) => {
            todo.completed = e.target.checked;
            renderTodos();  
          });

          
          const textSpan = document.createElement('span');
          textSpan.className = 'todo-text';
          textSpan.textContent = todo.text;

          
          const editInput = document.createElement('input');
          editInput.type = 'text';
          editInput.className = 'edit-input';
          editInput.value = todo.text;
          editInput.setAttribute('aria-label', 'Edit todo text');

          
          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'item-actions';

          
          const editBtn = document.createElement('button');
          editBtn.textContent = 'Edit';
          editBtn.className = 'edit-btn';
          editBtn.setAttribute('aria-label', 'Edit this task');

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Delete';
          deleteBtn.className = 'delete-btn';
          deleteBtn.setAttribute('aria-label', 'Delete task');

          
          const saveBtn = document.createElement('button');
          saveBtn.textContent = 'Save';
          saveBtn.className = 'edit-save-btn';
          saveBtn.setAttribute('aria-label', 'Save changes');
          
          actionsDiv.appendChild(editBtn);
          actionsDiv.appendChild(deleteBtn);
          actionsDiv.appendChild(saveBtn);  
          
          li.appendChild(checkbox);
          li.appendChild(textSpan);
          li.appendChild(editInput);
          li.appendChild(actionsDiv);

          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            
            li.classList.add('edit-mode');
            
            editInput.focus();
            editInput.selectionStart = editInput.value.length;
          });

          saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const newText = editInput.value.trim();
            if (newText === '') {
              alert('Todo cannot be empty');
              return;
            }
            todo.text = newText;
            li.classList.remove('edit-mode');
            renderTodos();  
          });

          
          editInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              saveBtn.click();
            }
          });

          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm('Delete this task?')) {
              todos = todos.filter(t => t.id !== todo.id);
              renderTodos();
            }
          });

          todoContainer.appendChild(li);
        });
      }

      function addNewTodo() {
        const text = newInput.value.trim();
        if (text === '') {
          alert('Please enter something');
          return;
        }
        const newTodo = {
          id: uid(),
          text: text,
          completed: false
        };
        todos.push(newTodo);
        renderTodos();
        newInput.value = '';   
        newInput.focus();
      }

      
      addBtn.addEventListener('click', addNewTodo);
      newInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          addNewTodo();
        }
      });

      
      renderTodos();
    })();
  </script>
</body>
</html>
